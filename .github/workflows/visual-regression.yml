# Visual regression harness for @dreampak/design-system.
#
# This workflow is intentionally annotated — the repo is public, so a future
# reader (or future agent) can pick up cold. The harness validates that the
# package's primitives render the same across versions by screenshot-diffing
# dp-app-template's /showcase route against committed baselines.
#
# Why two repos: the package itself has no app to render in. dp-app-template
# is the canonical consumer and hosts /showcase, a single page that exercises
# every primitive variant. The workflow clones both side-by-side, boots the
# template's dev server, and runs Playwright against it.
#
# Baselines live in tests/__screenshots__/ inside this repo. Intentional
# design changes are regenerated locally with `npm run test:visual:update`
# and committed alongside the change.

name: Visual regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual trigger for the design-system maintainer to re-run after pushing
  # a baseline regeneration.
  workflow_dispatch:

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Step 1 — check out the package repo into ./dp-design-system.
      # We use an explicit `path` so we can also check out dp-app-template
      # as a sibling, which is how the dev paths inside the design system
      # consumers are laid out locally (../dp-app-template from the package).
      - name: Check out dp-design-system
        uses: actions/checkout@v4
        with:
          path: dp-design-system

      # Step 2 — check out dp-app-template as a sibling. The package's
      # playwright.config.ts boots `cd ../dp-app-template && npm run dev`,
      # so the working directories must match the local-dev layout.
      #
      # dp-app-template is currently a private repo, so this step needs a
      # PAT with `repo` read scope stored as the secret
      # `DP_APP_TEMPLATE_READ_TOKEN`. If the secret is missing the workflow
      # falls back to the public clone URL and will fail loudly — that's
      # intentional; an unannotated quiet failure here would let visual
      # drift through.
      - name: Check out dp-app-template
        uses: actions/checkout@v4
        with:
          repository: a-espinoza/dp-app-template
          path: dp-app-template
          token: ${{ secrets.DP_APP_TEMPLATE_READ_TOKEN }}

      # Step 3 — Node + caching for both repos.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            dp-design-system/package-lock.json
            dp-app-template/package-lock.json

      # Step 4 — install package deps. This pulls @playwright/test +
      # playwright as devDependencies declared in package.json.
      - name: Install dp-design-system deps
        working-directory: dp-design-system
        run: npm ci

      # Step 5 — install Playwright browsers. Chromium is enough for the
      # harness; the other engines aren't needed because the showcase is
      # not engine-conditional.
      - name: Install Playwright browsers
        working-directory: dp-design-system
        run: npx playwright install --with-deps chromium

      # Step 6 — install dp-app-template deps. The template's package.json
      # depends on @dreampak/design-system via a github: URL, so npm ci
      # resolves it against the package's main branch (NOT the PR's
      # branch). For PRs that touch the package source itself we override
      # the install by linking the local checkout in step 7.
      - name: Install dp-app-template deps
        working-directory: dp-app-template
        run: npm ci

      # Step 7 — link the local dp-design-system checkout into the template
      # so visual-diff PRs that change the package source are tested against
      # those changes, not against the published main.
      - name: Link local dp-design-system into the template
        working-directory: dp-app-template
        run: |
          # Replace whatever npm ci pulled with a symlink to the local
          # checkout. Symlinks are recognized by Next.js's transpilePackages.
          rm -rf node_modules/@dreampak/design-system
          mkdir -p node_modules/@dreampak
          ln -s "$GITHUB_WORKSPACE/dp-design-system" node_modules/@dreampak/design-system

      # Step 8 — run the harness. playwright.config.ts boots the template's
      # dev server via webServer.command; reuseExistingServer=false in CI so
      # the boot is deterministic.
      - name: Run visual regression
        working-directory: dp-design-system
        env:
          CI: "true"
        run: npm run test:visual

      # Step 9 — upload the report on failure. The HTML report includes the
      # diff PNGs so a reviewer can decide between "real regression" and
      # "intentional change, update baselines."
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dp-design-system/playwright-report/
          retention-days: 14

      # Step 10 — upload the test-results dir on failure (contains the
      # actual + expected PNGs side-by-side).
      - name: Upload diff screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: dp-design-system/test-results/
          retention-days: 14
